<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>界重ね プロトタイプ v0.1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background: #0B0D16; color: #DDE3F5;
    font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #app { height: 100dvh; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; }

  /* 上部: 敵情報 */
  #topbar { padding: 10px 14px 8px; }
  #topbar .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  #ename { font-size: 15px; font-weight: 600; letter-spacing: 0.06em; }
  .tag { font-size: 11px; color: #8B93B4; }
  .tag.hot { color: #FF7FBE; font-weight: 600; }
  .bar { height: 9px; background: #1A1F31; border-radius: 5px; overflow: hidden; }
  .bar > div { height: 100%; transition: width 0.15s; }
  .bar.red > div { background: linear-gradient(90deg, #E24B4A, #FF7A5C); width: 100%; }
  .bar.green > div { background: linear-gradient(90deg, #1D9E75, #4CC998); width: 100%; }

  /* 中央: フィールド */
  #stage { flex: 1; min-height: 0; position: relative; padding: 0 8px; }
  #cv { width: 100%; height: 100%; display: block; border-radius: 14px; }

  /* オーバーレイ */
  #overlay {
    position: absolute; inset: 0; margin: 0 8px;
    background: rgba(11,13,22,0.82); backdrop-filter: blur(3px);
    border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 16px;
  }
  #overlay.hidden { display: none; }
  #ov-title { font-size: 24px; font-weight: 700; letter-spacing: 0.1em; }
  #ov-body { font-size: 14px; line-height: 1.9; color: #B9C1DC; }
  #ov-body b { color: #EAF0FF; }
  #ov-body .dim { color: #7B84A8; font-size: 12.5px; }
  #ov-body .warn { color: #FF8C8C; font-weight: 600; }
  #ov-btn {
    font-size: 16px; font-weight: 600; color: #0B0D16;
    background: linear-gradient(180deg, #BFE7FF, #7FA8FF);
    border: none; border-radius: 12px; padding: 14px 34px; cursor: pointer;
  }
  #ov-btn:active { transform: scale(0.96); }

  /* プレイヤーHP */
  #phbar { display: flex; align-items: center; gap: 10px; padding: 8px 14px 4px; }
  #phbar label { font-size: 11px; color: #8B93B4; white-space: nowrap; }
  #phbar .bar { flex: 1; height: 7px; }
  #buff { font-size: 11px; color: #FFD86B; min-width: 86px; text-align: right; }

  /* 下部: 操作 */
  #controls { display: flex; gap: 12px; padding: 8px 14px calc(14px + env(safe-area-inset-bottom)); align-items: flex-end; }
  #stickzone { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; }
  #stick {
    width: 92px; height: 92px; border-radius: 50%;
    border: 2px solid #2E3550; background: rgba(26,31,49,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  #knob { width: 38px; height: 38px; border-radius: 50%; background: #3A4568; }
  .hint { font-size: 10px; color: #5F678A; }

  #btns { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .skillgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  button.gbtn {
    position: relative; overflow: hidden;
    background: #1A2036; color: #DDE3F5;
    border: 1px solid #2E3550; border-radius: 12px;
    min-height: 50px; font-size: 14.5px; font-weight: 600;
    font-family: inherit; cursor: pointer;
  }
  button.gbtn:active { background: #263056; }
  #atk { background: #39415F; font-size: 15px; }
  .rowb { display: flex; gap: 7px; }
  .rowb #atk { flex: 2; }
  .rowb #stepb { flex: 1; }
  .ct {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(8,10,18,0.75); color: #EAF0FF;
    font-size: 14px; font-weight: 700; border-radius: 11px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="row"><span id="ename">異界の魔獣</span><span class="tag" id="etag">討伐対象</span></div>
    <div class="bar red"><div id="ehp"></div></div>
  </div>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="overlay" class="hidden">
      <div id="ov-title"></div>
      <div id="ov-body"></div>
      <button id="ov-btn" type="button"></button>
    </div>
  </div>

  <div id="phbar">
    <label>主人公</label>
    <div class="bar green"><div id="php"></div></div>
    <span id="buff"></span>
  </div>

  <div id="controls">
    <div id="stickzone">
      <div id="stick"><div id="knob"></div></div>
      <span class="hint">移動</span>
    </div>
    <div id="btns">
      <div class="skillgrid">
        <button class="gbtn sk" data-i="0" type="button">居合<span class="ct" id="ct-0"></span></button>
        <button class="gbtn sk" data-i="1" type="button">兜割り<span class="ct" id="ct-1"></span></button>
        <button class="gbtn sk" data-i="2" type="button">燕返し<span class="ct" id="ct-2"></span></button>
        <button class="gbtn sk" data-i="3" type="button">構え直し<span class="ct" id="ct-3"></span></button>
      </div>
      <div class="rowb">
        <button class="gbtn" id="atk" type="button">通常攻撃</button>
        <button class="gbtn" id="stepb" type="button">ステップ<span class="ct" id="ct-step"></span></button>
      </div>
    </div>
  </div>
</div>
<script>
'use strict';
// ============================================================
//  界重ね プロトタイプ v0.1 - バトル検証ビルド
//  検証テーマ:「予兆を避けながらCTを回す」は気持ちいいか?
// ============================================================

// ---------- キャンバス ----------
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W = 300, H = 300, DPR = 1;
let cracks = [];

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const r = cv.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  genCracks();
}
window.addEventListener('resize', resize);

function genCracks() {
  cracks = [];
  for (let i = 0; i < 8; i++) {
    const pts = [];
    let x = Math.random() * W, y = Math.random() * H;
    pts.push([x, y]);
    const n = 3 + Math.floor(Math.random() * 4);
    for (let j = 0; j < n; j++) {
      x += (Math.random() - 0.5) * 150;
      y += (Math.random() - 0.5) * 150;
      pts.push([x, y]);
    }
    cracks.push(pts);
  }
}

// ---------- サウンド(簡易シンセ) ----------
let AC = null;
function initAudio() {
  try { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); if (AC.state === 'suspended') AC.resume(); } catch (e) {}
}
function beep(f, d, type, vol) {
  try {
    if (!AC) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'square'; o.frequency.value = f;
    g.gain.value = vol || 0.035;
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + d);
  } catch (e) {}
}

// ---------- 入力 ----------
const keys = new Set();
window.addEventListener('keydown', e => {
  keys.add(e.key.toLowerCase());
  if (state === 'play') {
    if (e.key === '1') useSkill(0);
    if (e.key === '2') useSkill(1);
    if (e.key === '3') useSkill(2);
    if (e.key === '4') useSkill(3);
    if (e.key === ' ' || e.key.toLowerCase() === 'j') { e.preventDefault(); normalAttack(); }
    if (e.key.toLowerCase() === 'k' || e.key === 'Shift') doStep();
  }
});
window.addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

const zone = document.getElementById('stickzone');
const stickEl = document.getElementById('stick');
const knob = document.getElementById('knob');
const joy = { id: null, dx: 0, dy: 0 };

function moveJoy(e) {
  const r = stickEl.getBoundingClientRect();
  const cx0 = r.left + r.width / 2, cy0 = r.top + r.height / 2;
  let dx = e.clientX - cx0, dy = e.clientY - cy0;
  const m = Math.hypot(dx, dy), max = r.width / 2 - 4;
  if (m > max) { dx *= max / m; dy *= max / m; }
  knob.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  joy.dx = dx / max; joy.dy = dy / max;
}
zone.addEventListener('pointerdown', e => {
  e.preventDefault(); initAudio();
  joy.id = e.pointerId;
  try { zone.setPointerCapture(e.pointerId); } catch (err) {}
  moveJoy(e);
});
zone.addEventListener('pointermove', e => { if (e.pointerId === joy.id) moveJoy(e); });
function joyEnd(e) {
  if (e.pointerId !== joy.id) return;
  joy.id = null; joy.dx = 0; joy.dy = 0;
  knob.style.transform = 'translate(0,0)';
}
zone.addEventListener('pointerup', joyEnd);
zone.addEventListener('pointercancel', joyEnd);

function moveVec() {
  let x = joy.dx, y = joy.dy;
  if (keys.has('a') || keys.has('arrowleft')) x -= 1;
  if (keys.has('d') || keys.has('arrowright')) x += 1;
  if (keys.has('w') || keys.has('arrowup')) y -= 1;
  if (keys.has('s') || keys.has('arrowdown')) y += 1;
  const m = Math.hypot(x, y);
  if (m > 1) { x /= m; y /= m; }
  return { x: x, y: y, m: Math.min(m, 1) };
}

// ---------- ゲーム状態 ----------
let state = 'title'; // title | play | win | lose
let elapsed = 0;
let shakeT = 0;

const SKILLS = [
  { id: 'iai',     name: '居合',     ct: 6 },
  { id: 'kabuto',  name: '兜割り',   ct: 10 },
  { id: 'tsubame', name: '燕返し',   ct: 8 },
  { id: 'kamae',   name: '構え直し', ct: 16 }
];

const player = {
  x: 0, y: 0, r: 13, speed: 175,
  hp: 100, maxHp: 100,
  face: -Math.PI / 2,
  invulnT: 0, hurtTick: 0, buffT: 0,
  cds: {}
};

const enemy = {
  segs: [], hp: 520, maxHp: 520,
  state: 'move', castT: 0, phase: 0,
  flashT: 0, enraged: false,
  lungeT: 0, lvx: 0, lvy: 0,
  cool: {}
};

let telegraphs = [];
let fx = [];
let texts = [];
let pending = [];

function reset() {
  elapsed = 0; shakeT = 0;
  player.x = W / 2; player.y = H * 0.72;
  player.hp = player.maxHp; player.face = -Math.PI / 2;
  player.invulnT = 0; player.hurtTick = 0; player.buffT = 0;
  player.cds = { normal: 0, step: 0, iai: 0, kabuto: 0, tsubame: 0, kamae: 0 };

  enemy.hp = enemy.maxHp; enemy.state = 'move'; enemy.castT = 0;
  enemy.phase = 0; enemy.flashT = 0; enemy.enraged = false; enemy.lungeT = 0;
  enemy.cool = { bite: 2, breath: 3.5, sweep: 5, coil: 10 };
  enemy.segs = [];
  const rs = [20, 17, 15, 14, 13, 12, 11, 10, 9, 8, 8];
  for (let i = 0; i < rs.length; i++) {
    enemy.segs.push({
      x: W / 2, y: H * 0.22 - i * 20, r: rs[i],
      ca: Math.random() * Math.PI, cj: (Math.random() - 0.5) * 8
    });
  }
  telegraphs = []; fx = []; texts = []; pending = [];
  updateBars();
  setTag('討伐対象', false);
}

// ---------- UI ----------
const ehpEl = document.getElementById('ehp');
const phpEl = document.getElementById('php');
const buffEl = document.getElementById('buff');
const tagEl = document.getElementById('etag');
const overlayEl = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovBody = document.getElementById('ov-body');
const ovBtn = document.getElementById('ov-btn');

function setTag(t, hot) {
  tagEl.textContent = t;
  tagEl.className = hot ? 'tag hot' : 'tag';
}
function updateBars() {
  ehpEl.style.width = Math.max(0, enemy.hp / enemy.maxHp * 100) + '%';
  phpEl.style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
}

function showOverlay(title, body, btn) {
  ovTitle.textContent = title;
  ovBody.innerHTML = body;
  ovBtn.textContent = btn;
  overlayEl.classList.remove('hidden');
}
ovBtn.addEventListener('pointerdown', e => {
  e.preventDefault(); initAudio();
  overlayEl.classList.add('hidden');
  reset(); state = 'play';
});

// ボタン
document.querySelectorAll('.sk').forEach(b => {
  b.addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); useSkill(parseInt(b.dataset.i, 10)); });
});
document.getElementById('atk').addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); normalAttack(); });
document.getElementById('stepb').addEventListener('pointerdown', e => { e.preventDefault(); initAudio(); doStep(); });

function updateButtons() {
  SKILLS.forEach((s, i) => {
    const rem = player.cds[s.id];
    const el = document.getElementById('ct-' + i);
    if (rem > 0) { el.style.display = 'flex'; el.textContent = rem.toFixed(1); }
    else el.style.display = 'none';
  });
  const st = player.cds.step;
  const se = document.getElementById('ct-step');
  if (st > 0) { se.style.display = 'flex'; se.textContent = st.toFixed(1); }
  else se.style.display = 'none';
  buffEl.textContent = player.buffT > 0 ? '⚔ 攻撃強化 ' + Math.ceil(player.buffT) : '';
}

// ---------- 攻撃(プレイヤー) ----------
function buffMul() { return player.buffT > 0 ? 1.5 : 1; }

function damageEnemy(d, x, y) {
  if (state !== 'play') return;
  const val = Math.round(d * buffMul());
  enemy.hp -= val; enemy.flashT = 0.1;
  const h = enemy.segs[0];
  texts.push({ x: (x || h.x), y: (y || h.y) - 24, txt: String(val), color: '#FFE9A8', t: 0, dur: 0.7, vy: -46 });
  beep(660 + Math.random() * 120, 0.05, 'square', 0.03);
  if (!enemy.enraged && enemy.hp < enemy.maxHp * 0.5) {
    enemy.enraged = true;
    setTag('怒り状態', true);
    texts.push({ x: h.x, y: h.y - 40, txt: '怒り!', color: '#FF7FBE', t: 0, dur: 1.1, vy: -20 });
    beep(140, 0.35, 'sawtooth', 0.05);
    shakeT = 0.3;
  }
  if (enemy.hp <= 0) win();
  updateBars();
}

function slash(range, arc, dmg, color) {
  const a = player.face;
  fx.push({ kind: 'arc', x: player.x, y: player.y, ang: a, arc: arc, r: range, t: 0, dur: 0.16, color: color || '#F2F5FF' });
  for (const s of enemy.segs) {
    const dx = s.x - player.x, dy = s.y - player.y;
    if (Math.hypot(dx, dy) < range + s.r) {
      let da = Math.atan2(dy, dx) - a;
      da = Math.atan2(Math.sin(da), Math.cos(da));
      if (Math.abs(da) < arc) {
        damageEnemy(dmg, s.x, s.y);
        sparks(s.x, s.y, color || '#F2F5FF');
        return true;
      }
    }
  }
  return false;
}

function sparks(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 120;
    fx.push({ kind: 'spark', x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, t: 0, dur: 0.35, color: color });
  }
}

function normalAttack() {
  if (state !== 'play' || player.cds.normal > 0) return;
  player.cds.normal = 0.45;
  slash(58, 1.05, 6);
}

function useSkill(i) {
  if (state !== 'play') return;
  const s = SKILLS[i];
  if (player.cds[s.id] > 0) return;
  player.cds[s.id] = s.ct;

  if (s.id === 'iai') {
    const a = player.face;
    const x1 = player.x, y1 = player.y;
    let x2 = x1 + Math.cos(a) * 155, y2 = y1 + Math.sin(a) * 155;
    x2 = Math.min(W - 16, Math.max(16, x2));
    y2 = Math.min(H - 16, Math.max(16, y2));
    player.x = x2; player.y = y2;
    player.invulnT = Math.max(player.invulnT, 0.25);
    fx.push({ kind: 'trail', x1: x1, y1: y1, x2: x2, y2: y2, t: 0, dur: 0.25, color: '#BFE7FF' });
    let hit = false;
    for (const s2 of enemy.segs) {
      if (pointToSeg(s2.x, s2.y, x1, y1, x2, y2) < 40 + s2.r) { hit = true; break; }
    }
    if (hit) { damageEnemy(22); sparks(player.x, player.y, '#BFE7FF'); }
    beep(880, 0.08, 'triangle', 0.05);
  }
  if (s.id === 'kabuto') {
    fx.push({ kind: 'charge', x: 0, y: 0, t: 0, dur: 0.35 });
    pending.push({ t: 0.35, fn: function () {
      const hit = slash(80, 0.85, 38, '#FFD86B');
      if (hit) { shakeT = 0.22; beep(180, 0.16, 'sawtooth', 0.06); }
    }});
    beep(320, 0.3, 'sine', 0.04);
  }
  if (s.id === 'tsubame') {
    slash(66, 1.5, 13);
    pending.push({ t: 0.16, fn: function () { slash(66, 1.5, 13); } });
    beep(760, 0.06, 'triangle', 0.04);
  }
  if (s.id === 'kamae') {
    player.buffT = 8;
    fx.push({ kind: 'ring', x: player.x, y: player.y, t: 0, dur: 0.5, color: '#FFD86B' });
    texts.push({ x: player.x, y: player.y - 26, txt: '攻撃強化!', color: '#FFD86B', t: 0, dur: 0.9, vy: -30 });
    beep(520, 0.12, 'sine', 0.05);
    beep(780, 0.2, 'sine', 0.04);
  }
}

function doStep() {
  if (state !== 'play' || player.cds.step > 0) return;
  player.cds.step = 2.5;
  const v = moveVec();
  let dx = v.x, dy = v.y;
  if (v.m < 0.15) {
    const h = enemy.segs[0];
    const a = Math.atan2(player.y - h.y, player.x - h.x);
    dx = Math.cos(a); dy = Math.sin(a);
  }
  const x1 = player.x, y1 = player.y;
  player.x = Math.min(W - 16, Math.max(16, player.x + dx * 105));
  player.y = Math.min(H - 16, Math.max(16, player.y + dy * 105));
  player.invulnT = Math.max(player.invulnT, 0.4);
  fx.push({ kind: 'trail', x1: x1, y1: y1, x2: player.x, y2: player.y, t: 0, dur: 0.2, color: '#9FB4E8' });
  beep(440, 0.05, 'sine', 0.03);
}

function pointToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const l2 = dx * dx + dy * dy;
  let t = l2 ? ((px - x1) * dx + (py - y1) * dy) / l2 : 0;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + dx * t), py - (y1 + dy * t));
}

// ---------- 敵AI ----------
function cd(v) { return enemy.enraged ? v * 0.72 : v; }

function damagePlayer(d) {
  if (state !== 'play') return;
  if (player.invulnT > 0) {
    texts.push({ x: player.x, y: player.y - 24, txt: '回避!', color: '#9FE8C8', t: 0, dur: 0.7, vy: -34 });
    return;
  }
  player.hp -= d;
  shakeT = Math.max(shakeT, 0.18);
  texts.push({ x: player.x, y: player.y - 24, txt: '-' + d, color: '#FF8C8C', t: 0, dur: 0.8, vy: -40 });
  beep(120, 0.18, 'sawtooth', 0.06);
  updateBars();
  if (player.hp <= 0) lose();
}

function updateEnemy(dt) {
  const h = enemy.segs[0];
  const p = player;
  for (const k in enemy.cool) enemy.cool[k] -= dt;
  enemy.phase += dt * 3.4;
  if (enemy.flashT > 0) enemy.flashT -= dt;

  const dToP = Math.hypot(p.x - h.x, p.y - h.y);
  const aToP = Math.atan2(p.y - h.y, p.x - h.x);

  if (enemy.state === 'move') {
    const sp = (enemy.enraged ? 88 : 64);
    const ang = aToP + Math.sin(enemy.phase) * 0.55;
    h.x += Math.cos(ang) * sp * dt;
    h.y += Math.sin(ang) * sp * dt;

    // 技の選択
    if (enemy.cool.coil <= 0 && enemy.hp < enemy.maxHp * 0.9) {
      enemy.cool.coil = cd(13);
      castTelegraph({ shape: 'circle', x: h.x, y: h.y, r: 175, dur: 1.8, dmg: 40 });
      texts.push({ x: h.x, y: h.y - 44, txt: 'とぐろ絞め!', color: '#FFB0B0', t: 0, dur: 1.2, vy: -16 });
      beep(200, 0.5, 'sawtooth', 0.045);
    } else if (enemy.cool.breath <= 0 && dToP > 100 && dToP < 330) {
      enemy.cool.breath = cd(7.5);
      castTelegraph({ shape: 'cone', x: h.x, y: h.y, ang: aToP, half: 0.55, r: 235, dur: 1.1, dmg: 22 });
      beep(300, 0.25, 'square', 0.035);
    } else if (enemy.cool.sweep <= 0 && dToP < 150) {
      enemy.cool.sweep = cd(6);
      castTelegraph({ shape: 'circle', x: h.x, y: h.y, r: 115, dur: 0.85, dmg: 16 });
      beep(260, 0.15, 'square', 0.035);
    } else if (enemy.cool.bite <= 0 && dToP < 120) {
      enemy.cool.bite = cd(2.8);
      enemy.state = 'lunge'; enemy.lungeT = 0.26;
      enemy.lvx = Math.cos(aToP) * 340; enemy.lvy = Math.sin(aToP) * 340;
    }
  } else if (enemy.state === 'cast') {
    enemy.castT -= dt;
    if (enemy.castT <= 0) enemy.state = 'move';
  } else if (enemy.state === 'lunge') {
    enemy.lungeT -= dt;
    h.x += enemy.lvx * dt; h.y += enemy.lvy * dt;
    if (enemy.lungeT <= 0) enemy.state = 'move';
  }

  h.x = Math.min(W - 30, Math.max(30, h.x));
  h.y = Math.min(H - 30, Math.max(30, h.y));

  // 体の追従
  for (let i = 1; i < enemy.segs.length; i++) {
    const pr = enemy.segs[i - 1], s = enemy.segs[i];
    let dx = s.x - pr.x, dy = s.y - pr.y;
    const d = Math.hypot(dx, dy) || 1;
    const want = pr.r * 0.9 + s.r * 0.45;
    s.x = pr.x + dx / d * want;
    s.y = pr.y + dy / d * want;
  }

  // 接触ダメージ
  if (player.hurtTick > 0) player.hurtTick -= dt;
  if (player.hurtTick <= 0 && Math.hypot(p.x - h.x, p.y - h.y) < h.r + p.r + 2) {
    damagePlayer(6);
    player.hurtTick = 0.8;
    const a = Math.atan2(p.y - h.y, p.x - h.x);
    p.x = Math.min(W - 16, Math.max(16, p.x + Math.cos(a) * 30));
    p.y = Math.min(H - 16, Math.max(16, p.y + Math.sin(a) * 30));
  }
}

function castTelegraph(t) {
  t.t = 0;
  telegraphs.push(t);
  enemy.state = 'cast';
  enemy.castT = t.dur;
}

function updateTelegraphs(dt) {
  for (let i = telegraphs.length - 1; i >= 0; i--) {
    const t = telegraphs[i];
    t.t += dt;
    if (t.t >= t.dur) {
      // 着弾判定
      let inside = false;
      const dx = player.x - t.x, dy = player.y - t.y;
      const d = Math.hypot(dx, dy);
      if (t.shape === 'circle') inside = d < t.r + player.r * 0.5;
      else {
        let da = Math.atan2(dy, dx) - t.ang;
        da = Math.atan2(Math.sin(da), Math.cos(da));
        inside = d < t.r && Math.abs(da) < t.half;
      }
      fx.push({ kind: 'boom', x: t.x, y: t.y, r: t.r, shape: t.shape, ang: t.ang, half: t.half, t: 0, dur: 0.25 });
      if (inside) damagePlayer(t.dmg);
      beep(90, 0.2, 'sawtooth', 0.05);
      telegraphs.splice(i, 1);
    }
  }
}

// ---------- 勝敗 ----------
function win() {
  state = 'win';
  beep(660, 0.12, 'sine', 0.05);
  setTimeout(function () { beep(880, 0.12, 'sine', 0.05); }, 130);
  setTimeout(function () { beep(1100, 0.25, 'sine', 0.05); }, 270);
  showOverlay('討伐成功!',
    '「異界の魔獣」を狩り伏せた。<br>タイム: <b>' + elapsed.toFixed(1) + '秒</b><br><span class="dim">……その骸は、どこか龍に似ていた。</span>',
    'もう一度狩る');
}
function lose() {
  state = 'lose';
  showOverlay('力尽きた……',
    '狩りは失敗に終わった。<br><span class="dim">予兆(赤い範囲)から逃げ、CTの戻った技を叩き込もう。</span>',
    '再挑戦する');
}

// ---------- 更新 ----------
function update(dt) {
  elapsed += dt;
  if (shakeT > 0) shakeT -= dt;
  if (player.invulnT > 0) player.invulnT -= dt;
  if (player.buffT > 0) player.buffT -= dt;
  for (const k in player.cds) if (player.cds[k] > 0) player.cds[k] -= dt;

  // 移動
  const v = moveVec();
  player.x = Math.min(W - 16, Math.max(16, player.x + v.x * player.speed * dt));
  player.y = Math.min(H - 16, Math.max(16, player.y + v.y * player.speed * dt));

  // 自動照準(敵の頭へ)
  const h = enemy.segs[0];
  player.face = Math.atan2(h.y - player.y, h.x - player.x);

  // 予約アクション
  for (let i = pending.length - 1; i >= 0; i--) {
    pending[i].t -= dt;
    if (pending[i].t <= 0) { const fn = pending[i].fn; pending.splice(i, 1); fn(); }
  }

  updateEnemy(dt);
  updateTelegraphs(dt);

  for (let i = fx.length - 1; i >= 0; i--) {
    const f = fx[i]; f.t += dt;
    if (f.kind === 'spark') { f.x += f.vx * dt; f.y += f.vy * dt; }
    if (f.t >= f.dur) fx.splice(i, 1);
  }
  for (let i = texts.length - 1; i >= 0; i--) {
    const t = texts[i]; t.t += dt; t.y += t.vy * dt;
    if (t.t >= t.dur) texts.splice(i, 1);
  }
}

// ---------- 描画 ----------
function draw() {
  cx.save();
  if (shakeT > 0) cx.translate((Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7);

  // 背景
  cx.fillStyle = '#10131F';
  cx.fillRect(-10, -10, W + 20, H + 20);
  cx.strokeStyle = 'rgba(120,220,255,0.06)';
  cx.lineWidth = 1;
  for (const pts of cracks) {
    cx.beginPath();
    cx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) cx.lineTo(pts[i][0], pts[i][1]);
    cx.stroke();
  }

  // 予兆
  for (const t of telegraphs) {
    const prog = t.t / t.dur;
    const pulse = 0.5 + 0.5 * Math.sin(t.t * 18);
    drawZone(t, t.r, 'rgba(226,75,74,' + (0.10 + 0.06 * pulse) + ')', 'rgba(226,75,74,0.85)', true);
    drawZone(t, t.r * prog, 'rgba(226,75,74,0.30)', null, false);
  }

  // 着弾フラッシュ
  for (const f of fx) {
    if (f.kind === 'boom') {
      const a = 1 - f.t / f.dur;
      drawZone(f, f.r, 'rgba(255,120,110,' + (0.35 * a) + ')', null, false);
    }
  }

  drawEnemy();
  drawPlayer();

  // エフェクト
  for (const f of fx) {
    const a = 1 - f.t / f.dur;
    if (f.kind === 'arc') {
      cx.save();
      cx.globalAlpha = a;
      cx.strokeStyle = f.color; cx.lineWidth = 4; cx.lineCap = 'round';
      cx.beginPath();
      cx.arc(f.x, f.y, f.r * (0.75 + 0.35 * (f.t / f.dur)), f.ang - f.arc, f.ang + f.arc);
      cx.stroke();
      cx.restore();
    } else if (f.kind === 'trail') {
      cx.save();
      cx.globalAlpha = a * 0.8;
      cx.strokeStyle = f.color; cx.lineWidth = 6; cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(f.x1, f.y1); cx.lineTo(f.x2, f.y2); cx.stroke();
      cx.restore();
    } else if (f.kind === 'spark') {
      cx.save();
      cx.globalAlpha = a;
      cx.fillStyle = f.color;
      cx.beginPath(); cx.arc(f.x, f.y, 2.5, 0, Math.PI * 2); cx.fill();
      cx.restore();
    } else if (f.kind === 'ring') {
      cx.save();
      cx.globalAlpha = a;
      cx.strokeStyle = f.color; cx.lineWidth = 3;
      cx.beginPath(); cx.arc(f.x, f.y, 14 + 40 * (f.t / f.dur), 0, Math.PI * 2); cx.stroke();
      cx.restore();
    } else if (f.kind === 'charge') {
      cx.save();
      cx.globalAlpha = 0.7;
      cx.strokeStyle = '#FFD86B'; cx.lineWidth = 2;
      cx.beginPath();
      cx.arc(player.x, player.y, 26 * (1 - f.t / f.dur) + 14, 0, Math.PI * 2);
      cx.stroke();
      cx.restore();
    }
  }

  // ダメージ数字
  for (const t of texts) {
    cx.save();
    cx.globalAlpha = 1 - (t.t / t.dur) * 0.9;
    cx.fillStyle = t.color;
    cx.font = '600 15px system-ui, sans-serif';
    cx.textAlign = 'center';
    cx.fillText(t.txt, t.x, t.y);
    cx.restore();
  }

  cx.restore();
}

function drawZone(t, r, fill, stroke, dashed) {
  cx.save();
  cx.beginPath();
  if (t.shape === 'circle') cx.arc(t.x, t.y, r, 0, Math.PI * 2);
  else { cx.moveTo(t.x, t.y); cx.arc(t.x, t.y, r, t.ang - t.half, t.ang + t.half); cx.closePath(); }
  if (fill) { cx.fillStyle = fill; cx.fill(); }
  if (stroke) {
    cx.strokeStyle = stroke; cx.lineWidth = 1.5;
    if (dashed) cx.setLineDash([6, 5]);
    cx.stroke();
  }
  cx.restore();
}

function drawEnemy() {
  const glow = enemy.enraged ? '#FF5FA8' : '#63D8FF';
  for (let i = enemy.segs.length - 1; i >= 0; i--) {
    const s = enemy.segs[i];
    cx.save();
    cx.fillStyle = '#1B2136';
    cx.strokeStyle = 'rgba(255,255,255,0.10)';
    cx.lineWidth = 1;
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    cx.fill(); cx.stroke();
    // 亀裂の光
    cx.shadowColor = glow; cx.shadowBlur = 10;
    cx.strokeStyle = glow; cx.lineWidth = 1.5;
    cx.beginPath();
    const l = s.r * 0.9;
    cx.moveTo(s.x - Math.cos(s.ca) * l, s.y - Math.sin(s.ca) * l);
    cx.lineTo(s.x + s.cj * 0.4, s.y + s.cj * 0.3);
    cx.lineTo(s.x + Math.cos(s.ca) * l, s.y + Math.sin(s.ca) * l);
    cx.stroke();
    cx.restore();
    if (enemy.flashT > 0 && i < 3) {
      cx.save();
      cx.globalAlpha = enemy.flashT * 6;
      cx.fillStyle = '#FFFFFF';
      cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI * 2); cx.fill();
      cx.restore();
    }
  }
  // 頭部: 角と目
  const h = enemy.segs[0], n = enemy.segs[1];
  const ang = Math.atan2(h.y - n.y, h.x - n.x);
  cx.save();
  cx.translate(h.x, h.y); cx.rotate(ang);
  cx.fillStyle = '#2A3350';
  cx.beginPath(); cx.moveTo(4, -h.r * 0.5); cx.lineTo(16, -h.r - 8); cx.lineTo(-4, -h.r * 0.6); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(4, h.r * 0.5); cx.lineTo(16, h.r + 8); cx.lineTo(-4, h.r * 0.6); cx.closePath(); cx.fill();
  cx.fillStyle = '#FFC65C';
  cx.beginPath(); cx.arc(h.r * 0.45, -h.r * 0.35, 2.6, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.arc(h.r * 0.45, h.r * 0.35, 2.6, 0, Math.PI * 2); cx.fill();
  cx.restore();
}

function drawPlayer() {
  const p = player;
  cx.save();
  if (p.invulnT > 0) cx.globalAlpha = 0.55;
  if (p.buffT > 0) {
    cx.strokeStyle = 'rgba(255,216,107,' + (0.5 + 0.3 * Math.sin(elapsed * 8)) + ')';
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(p.x, p.y, p.r + 7, 0, Math.PI * 2); cx.stroke();
  }
  cx.fillStyle = '#EAF0FF';
  cx.strokeStyle = '#7FA8FF'; cx.lineWidth = 2;
  cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  cx.fill(); cx.stroke();
  // 刀(向き表示)
  cx.strokeStyle = '#FFFFFF'; cx.lineWidth = 3; cx.lineCap = 'round';
  cx.shadowColor = '#BFE7FF'; cx.shadowBlur = 6;
  cx.beginPath();
  cx.moveTo(p.x + Math.cos(p.face) * (p.r - 2), p.y + Math.sin(p.face) * (p.r - 2));
  cx.lineTo(p.x + Math.cos(p.face) * (p.r + 20), p.y + Math.sin(p.face) * (p.r + 20));
  cx.stroke();
  cx.restore();
}

// ---------- メインループ ----------
let last = performance.now();
function frame(t) {
  const dt = Math.min(0.033, (t - last) / 1000);
  last = t;
  if (state === 'play') { update(dt); updateButtons(); }
  draw();
  requestAnimationFrame(frame);
}

// ---------- 起動 ----------
resize();
reset();
showOverlay('界重ね プロトタイプ',
  '<b>「異界の魔獣」討伐 検証ビルド v0.1</b><br><br>' +
  '左下スティックで移動 / 右下のボタンで攻撃<br>' +
  '<span class="warn">赤い範囲は予兆。</span>範囲の外へ逃げよう<br>' +
  '技にはCT(クールタイム)がある<br><br>' +
  '<span class="dim">PC: WASD移動 / J or Space攻撃 / 1〜4技 / Kステップ</span>',
  '狩りを始める');
requestAnimationFrame(frame);
</script>
</body>
